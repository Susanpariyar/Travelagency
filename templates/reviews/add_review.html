{% extends 'base.html' %}

{% block title %}
Add Review
{% endblock %}

{% block content %}

<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">

Review for {{ package.name }}

</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Rating

</label>

{{ form.rating }}

</div>

<div class="mb-3">

<label class="form-label">

Comment

</label>

{{ form.comment }}

</div>

<button type="submit"
class="btn btn-success">

Submit Review

</button>

<a href="{% url 'package_detail' package.slug %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
