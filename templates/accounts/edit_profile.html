{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
    <h1>Edit Profile</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <h3>User Information</h3>
        {{ user_form.as_p }}

        <h3>Profile Information</h3>
        {{ profile_form.as_p }}

        <button type="submit">Update Profile</button>
    </form>
{% endblock %}
